services:
    app:
        build:
            context: .
            args:
                NEW_UID: ${NEW_UID:-1000}
                NEW_GID: ${NEW_GID:-1000}
            dockerfile: docker/Dockerfile
        environment:
            FASTAPI_CONFIG_PATH: /src/app.conf
        volumes:
            - ./:/src
            - /src/.venv
            - ./secrets:/src/secrets
        ports:
            - 8577:8577
        extra_hosts:
            - "host.docker.internal:host-gateway"
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8577/health"]
            interval: 1m
            start_period: 30s
        networks:
            - gfmodules

networks:
  gfmodules:
    driver: bridge
